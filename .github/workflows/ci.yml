name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    outputs:
      has_netlify: ${{ steps.check.outputs.has_netlify }}
    steps:
      - id: check
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [[ -n "$NETLIFY_TOKEN" && -n "$NETLIFY_SITE" ]]; then
            echo "has_netlify=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_netlify=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ci-test-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: CI checks
        run: npm run test:ci

  deploy:
    needs: [test, detect-secrets]
    if: |
      github.ref == 'refs/heads/main'
      && needs.test.result == 'success'
      && needs.detect-secrets.outputs.has_netlify == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ci-deploy-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (static)
        run: npm run generate

      - name: Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=.output/public --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
